name: Build LineageOS 15.1 for SM-T331

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v3

    - name: Cài đặt và Tối ưu hệ thống (Free Disk Space)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell
        sudo apt-get clean
        
    - name: Khai báo kho lưu trữ cũ (Ubuntu 22.04 & 20.04)
      run: |
        echo "deb http://archive.ubuntu.com/ubuntu/ jammy universe" | sudo tee -a /etc/apt/sources.list
        echo "deb http://security.ubuntu.com/ubuntu focal-security main" | sudo tee -a /etc/apt/sources.list
        sudo apt-get update
        
    - name: Cài đặt các gói phụ trợ hệ thống (Sửa lỗi Python2 & Libncurses5)
      run: |
        sudo apt-get install -y python2-minimal python2 libssl1.1 libncurses5 libncurses-dev
        sudo apt-get install -y repo git-core gnupg flex bison build-essential zip curl \
          zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 lib32ncurses-dev \
          x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev libxml2-utils \
          xsltproc unzip openjdk-8-jdk bc libssl-dev ccache
          
    - name: Cấu hình Git vĩnh viễn
      run: |
        git config --global user.email "tuan_android_tinker@example.com"
        git config --global user.name "Android Builder"

    - name: Khởi tạo Workspace và mã nguồn LineageOS
      run: |
        mkdir -p ~/aosp
        cd ~/aosp
        repo init -u https://github.com/LineageOS/android.git -b lineage-15.1 --depth=1

    # ================= TUYỆT CHIÊU CUỐI: KHỞI TẠO LOCAL MANIFEST =================
    - name: Tạo cấu hình Local Manifest cho SM-T331
      run: |
        cd ~/aosp
        mkdir -p .repo/local_manifests
        
        # Tạo file roomservice.xml để ép hệ thống tự động tìm và móc nối mã nguồn bất tử
        cat <<EOF > .repo/local_manifests/roomservice.xml
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="LineageOS/android_device_samsung_millet3g" path="device/samsung/millet3g" remote="github" revision="lineage-15.1" />
          <project name="LineageOS/android_device_samsung_msm8226-common" path="device/samsung/msm8226-common" remote="github" revision="lineage-15.1" />
          <project name="LineageOS/android_kernel_samsung_msm8226" path="kernel/samsung/millet3g" remote="github" revision="lineage-15.1" />
          <project name="TheMuppets/proprietary_vendor_samsung" path="vendor/samsung" remote="github" revision="lineage-15.1" />
        </manifest>
        EOF
    # =============================================================================
        
    - name: Đồng bộ toàn bộ mã nguồn (Bao gồm cả code máy - CHỐNG TIMEOUT)
      run: |
        cd ~/aosp
        while true; do echo "...keep-alive..."; sleep 180; done &
        KEEPALIVE_PID=$!
        
        # Lệnh sync này sẽ tự động kéo cả đống file trong roomservice.xml về một lượt luôn
        repo sync -c -j8 --force-sync --no-clone-bundle --no-tags
        
        kill $KEEPALIVE_PID

    - name: Áp dụng EXTREME LITE PATCH & ANDROID GO MODE
      run: |
        cd ~/aosp
        rm -rf frameworks/base/data/bootanimation
        sed -i 's/config_windowAnimationScaleDefault">1/config_windowAnimationScaleDefault">0/g' frameworks/base/core/res/res/values/config.xml
        sed -i 's/config_transitionAnimationScaleDefault">1/config_transitionAnimationScaleDefault">0/g' frameworks/base/core/res/res/values/config.xml
        sed -i 's/config_animatorDurationScaleDefault">1/config_animatorDurationScaleDefault">0/g' frameworks/base/core/res/res/values/config.xml
        sed -i 's/config_defaultNightMode.*/config_defaultNightMode">2</g' frameworks/base/core/res/res/values/config.xml
        sed -i 's/#121212/#000000/g' frameworks/base/core/res/res/values/colors.xml
        sed -i 's/#000000ff/#000000/g' frameworks/base/core/res/res/values/colors.xml
        rm -f frameworks/base/core/res/res/drawable-nodpi/default_wallpaper.png
        
        echo -e "\nro.config.low_ram=true\nqemu.hw.mainkeys=0\nservice.adb.tcp.port=5555\npersist.adb.tcp.port=5555\npersist.sys.usb.config=mtp,adb" >> device/samsung/millet3g/system.prop
        
        echo "PRODUCT_PROPERTY_OVERRIDES += ro.config.low_ram=true" >> device/samsung/millet3g/lineage_millet3g.mk
        echo "PRODUCT_PROPERTY_OVERRIDES += qemu.hw.mainkeys=0" >> device/samsung/millet3g/lineage_millet3g.mk
        echo "PRODUCT_PROPERTY_OVERRIDES += service.adb.tcp.port=5555" >> device/samsung/millet3g/lineage_millet3g.mk
        echo "PRODUCT_PROPERTY_OVERRIDES += persist.adb.tcp.port=5555" >> device/samsung/millet3g/lineage_millet3g.mk

    - name: Cấu hình Jack Server
      run: |
        export JACK_SERVER_VM_ARGUMENTS="-Dfile.encoding=UTF-8 -XX:+TieredCompilation -Xmx4g"
        
    - name: Tiến hành Compile ROM (CHỐNG TIMEOUT - Bơm Log khi Biên dịch)
      run: |
        cd ~/aosp
        export USE_CCACHE=1
        export CCACHE_EXEC=/usr/bin/ccache
        ccache -M 20G
        
        while true; do echo "...compiling raw code..."; sleep 180; done &
        COMPILE_PID=$!
        
        source build/envsetup.sh
        lunch lineage_millet3g-userdebug
        mka bacon -j2
        
        kill $COMPILE_PID

    - name: Đẩy sản phẩm ROM .zip lên mục GitHub Releases
      uses: softprops/action-gh-release@v1
      if: success()
      with:
        files: /home/runner/aosp/out/target/product/millet3g/*.zip
        tag_name: lineage-15.1-millet3g-lite
        name: LineageOS 15.1 Extreme Lite (Android Go + ADB Wifi)
        body: |
          Bản build hoàn chỉnh tự động cho Samsung Galaxy Tab 4 8.0 (SM-T331).
          - Chuyển hẳn sang cơ chế tự động nạp Local Manifest (roomservice).
          - Vượt qua bộ lọc kiểm tra tài khoản của lệnh git clone thủ công.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
